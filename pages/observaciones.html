<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../css/bootstrap.min.css" >
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/all.min.js"></script>
    <!-- css propio -->
    <link rel="stylesheet" href="../css/estilo.css">
    <title>Educati - Observaciones</title>
</head>
<body>
  <nav class="sb-topnav navbar navbar-expand navbar-dark bg-green">
    <a class="navbar-brand" href="index.html">
      <img src="../images/educati-logo.png" alt="logo educati">
    </a>
    <button class="btn btn-link btn-sm order-1 order-lg-0" id="sidebarToggle" href="#"><i class="fas fa-bars"></i></button>
</nav>

<!-- Sidebar Nav-->
<div id="layoutSidenav">
  <div id="layoutSidenav_nav">
      <nav class="sb-sidenav accordion sb-sidenav-gray" id="sidenavAccordion">
          <div class="sb-sidenav-menu">
              <div class="nav">
                <!-- separacion entre logo y menu -->
                  <div class="sb-sidenav-menu-heading"></div>
                  <!-- comienza el menu lateral-->
                  <a class="nav-link" href="../index.html">
                      <div class="sb-nav-link-icon"><i class="fas fa-bookmark"></i></div>
                      Inicio
                  </a>
                  <!-- Institucion-->
                  <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseLayouts" aria-expanded="false" aria-controls="collapseLayouts">
                      <div class="sb-nav-link-icon"><i class="fas fa-address-card"></i></div>
                      Alumno
                      <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
                  </a>
                  <div class="collapse" id="collapseLayouts" aria-labelledby="headingOne" data-parent="#sidenavAccordion">
                      <nav class="sb-sidenav-menu-nested nav">
                          <a class="nav-link"  href="asistencia.html">Asistencia</a>
                          <a class="nav-link" href="clases.html">Clases</a>
                          <a class="nav-link" href="notas.html">Notas</a>
                      </nav>
                  </div>
                  <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapsePages" aria-expanded="false" aria-controls="collapsePages">
                      <div class="sb-nav-link-icon"><i class="fas fa-graduation-cap"></i></div>
                      Institución
                      <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
                  </a>
                  <div class="collapse" id="collapsePages" aria-labelledby="headingTwo" data-parent="#sidenavAccordion">
                    <nav class="sb-sidenav-menu-nested nav">
                      <a class="nav-link"  href="observaciones.html">Observaciones</a>
                    </nav>
                  </div>
          </div>
      </nav>
  </div>

<!-- Comienza el contenido-->
  <div id="layoutSidenav_content">
      <main>
          <div class="container-fluid">
              <h1 class="mt-4">Observaciones</h1>
                <div class="form-container ">
                    <form>
                        <div class="form-group">
                            <label for="Input-Alumno">Alumno</label>
                            <input type="text" class="form-control inputForm" id="Input-Alumno" placeholder="Apellido y Nombre">
                          </div>
                          <div class="form-group">
                            <label for="Input-Curso">Curso</label>
                            <input type="text" class="form-control inputForm" id="Input-Curso" placeholder="Ej: Desarrollo Web">
                          </div>
                          <div class="form-group">
                            <label for="Input-Clase">Clase</label>
                            <input type="text" class="form-control inputForm" id="Input-Clase" placeholder="Ej: HTML & CSS Basico">
                          </div>
                        <fieldset class="form-group">
                            <legend class="col-form-label col-sm-2 pt-0">Acción</legend>
                            <div class="col-sm-10">
                              <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="defaultCheck1">
                                <label class="form-check-label" for="defaultCheck1">
                                  Amonestación
                                </label>
                              </div>
                              <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="defaultCheck2" onchange="javascript:showContent()">
                                <label class="form-check-label" for="defaultCheck2">
                                  Comentario
                                </label>
                              </div>
                              <!-- Esta oculta, unicamente se visualizar si se hace check sobre "comentario"-->
                              <div id="content-text" class="form-group green-border-focus" style="display: none;">
                                <label id="comentario" for="textarea-comentario">Ingresar Comentario</label>
                                <textarea class="form-control" id="textarea-comentario" rows="3"></textarea>
                              </div>
                            </div>
                        </fieldset>

                        <!-- Boton -->
                        <div class="form-group row">
                          <div class="col-sm-10 btn-center">
                            <button type="button" class="btn btn-success" data-toggle="modal" data-target="#myModal">Enviar</button>
                          </div>
                        </div>
                      </form>

                </div>
          </div>
      </main>


      <!-- The Modal -->
      <div class="modal fade" id="myModal">
        <div class="modal-dialog">
          <div class="modal-content">
      
            <!-- Modal Header -->
            <div class="modal-header">
              <h4 class="modal-title">Observaciones</h4>
              <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
      
            <!-- Modal body -->
            <div class="modal-body">
              Se ha enviado la observación con exito.
            </div>
      
            <!-- Modal footer -->
            <div class="modal-footer">
              <button type="button" onclick="javascript:window.location.reload()" class="btn btn-danger" data-dismiss="modal">Cerrar</button>
            </div>
      
          </div>
        </div>
      </div>      

<!-- Footer -->
      <footer class="py-4 bg-light mt-auto">
          <div class="container-fluid">
              <div class="d-flex align-items-center justify-content-between small">
                  <div class="text-muted">Copyright &copy; Educati 2021</div>
              </div>
          </div>
      </footer>
  </div>
</div>
<!-- Bootstrap core JavaScript -->
  <script src="../js/jquery.min.js"></script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="../js/scripts.js"></script> 

  <!-- tuve un problema con este archivo, que cuando lo armo local, no funciona, pero si lo traigo de
  la web si.-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  <!-- Mis scripts -->
  <script src="../js/mi_js.js"></script>
</body>
</html>
